<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mode Switcher</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="42a12728-f6af-4287-9e9b-1e79ca627b37"></script>
  </head>
  <body>
    <!-- Mode content will be injected here -->
    <div id="wrapper">
      <div id="mode-container"></div>

      <!-- Sticky bottom nav -->
      <nav id="bottom-nav">
        <button
          class="nav-button active"
          data-mode="fingerpicker"
          style="background-image: url('assets/1.png'); background-size: cover"
        ></button>
        <button
          class="nav-button"
          data-mode="coinflip"
          style="background-image: url('assets/2.png'); background-size: cover"
        ></button>
        <button
          class="nav-button"
          data-mode="dice"
          style="background-image: url('assets/3.png'); background-size: cover"
        ></button>
        <button
          class="nav-button"
          data-mode="rng"
          style="background-image: url('assets/4.png'); background-size: cover"
        ></button>
      </nav>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
